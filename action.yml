name: Agglayer Roadmap Summaries to Slack
description:
  Publishes summaries of the Agglayer Roadmap GitHub repository project to Slack, with
  intelligent milestone-based grouping, issue trees, and progress tracking
author: sebastiendan

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: message-square
  color: purple

# Define your inputs here.
inputs:
  github-token:
    description: 'GitHub token with access to read projects'
    required: true
  project-url:
    description:
      'Agglayer Roadmap repository project URL (e.g., https://github.com/orgs/agglayer/projects/1)'
    required: true
  slack-bot-token:
    description: 'Slack Bot Token (use SLACK_APP_TOKEN_AGGLAYER_NOTIFY_ROADMAP)'
    required: true
  slack-channel:
    description: 'Slack channel to post to (e.g., #roadmap-updates or #standup)'
    required: true
  assignee-field:
    description:
      'Name of the assignee field in the project (defaults to "Assignees")'
    required: false
    default: 'Assignees'
  max-items-per-user:
    description: 'Maximum number of items to show per user (defaults to 10)'
    required: false
    default: '10'
  done-items-days:
    description: 'Show Done items only if completed within this many days (defaults to 1)'
    required: false
    default: '1'


# Define your outputs here.
outputs:
  summary-sent:
    description: 'Whether the roadmap summary was successfully sent to Slack'
  total-items:
    description: 'Total number of roadmap items processed'
  users-count:
    description: 'Number of milestones/assignees with items'

runs:
  using: node20
  main: dist/index.js
